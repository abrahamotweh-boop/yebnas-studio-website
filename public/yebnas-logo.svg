<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Purple to Blue Gradient for S and Arc -->
    <linearGradient id="ysGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="50%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <!-- Dark Navy for Y in light mode -->
    <linearGradient id="yDarkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>

    <!-- Subtle Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular Arc Background Halo -->
  <path d="M 160 100 A 150 150 0 1 1 200 380" 
        fill="none" 
        stroke="url(#ysGradient)" 
        stroke-width="5" 
        stroke-linecap="round" />

  <!-- Pixelated Tech Squares at top right -->
  <rect x="290" y="110" width="16" height="16" fill="#8B5CF6" rx="2" />
  <rect x="312" y="100" width="14" height="14" fill="#A855F7" rx="2" />
  <rect x="330" y="118" width="12" height="12" fill="#6366F1" rx="2" />
  <rect x="300" y="132" width="18" height="18" fill="#3B82F6" rx="2" />

  <!-- Main 'Y' Mark (Dark Navy) -->
  <g filter="url(#shadow)">
    <!-- Left Arm & Stem of Y -->
    <path d="M 130 130 L 210 130 L 285 240 L 285 320 L 235 320 L 235 260 Z" fill="url(#yDarkGrad)" />
    <!-- Right Arm of Y -->
    <path d="M 330 130 L 265 130 L 245 160 L 305 130 Z" fill="url(#yDarkGrad)" />
  </g>

  <!-- Main 'S' Mark (Purple-Blue Gradient) -->
  <g filter="url(#shadow)">
    <path d="M 285 150 C 340 150 380 170 380 200 C 380 230 330 240 280 250 C 230 260 210 270 210 290 C 210 315 260 325 330 325 C 360 325 390 315 410 300 L 385 270 C 365 285 340 295 315 295 C 275 295 255 285 255 275 C 255 265 280 255 325 245 C 375 235 425 220 425 180 C 425 140 370 120 290 120 Z" fill="url(#ysGradient)" />
  </g>

  <!-- Divider Line with Diamond -->
  <line x1="110" y1="410" x2="390" y2="410" stroke="#CBD5E1" stroke-width="1.5" />
  <polygon points="250,403 257,410 250,417 243,410" fill="#8B5CF6" />

  <!-- Tagline Text -->
  <text x="250" y="445" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="16" 
        font-weight="600" 
        letter-spacing="5" 
        fill="#475569" 
        text-anchor="middle">
    INNOVATE • CREATE • INSPIRE
  </text>
</svg>
